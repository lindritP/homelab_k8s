# Exposes the Argo CD UI/API at https://argocd.lindrit.at.
# Requires argocd-server to run in insecure mode (set in terraform/main.tf) so it
# serves plain HTTP on :80 and ingress-nginx terminates TLS.
#
# cert-manager watches this Ingress's tls block and issues a cert into the named
# secret via the annotated ClusterIssuer. Start on staging (browser-untrusted but no
# rate limits); once a cert issues cleanly, switch the annotation to
# letsencrypt-prod and delete the secret so a trusted cert is re-issued.
#
# sync-wave "2" lands this after cert-manager + ingress-nginx (wave -1) and the
# ClusterIssuers (wave 1).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    cert-manager.io/cluster-issuer: letsencrypt-staging
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
spec:
  ingressClassName: nginx
  rules:
    - host: argocd.lindrit.at
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
  tls:
    - hosts:
        - argocd.lindrit.at
      secretName: argocd-server-ingress-tls
