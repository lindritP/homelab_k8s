# cert-manager — issues/renews TLS certs (e.g. Let's Encrypt).
# crds.enabled:true installs the CRDs with the chart (this is the modern flag;
# the old `installCRDs` is deprecated). ServerSideApply avoids the
# "metadata.annotations: Too long" error on cert-manager's large CRDs.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"   # infrastructure deploys before apps
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.16.2   # crds.enabled requires chart >= v1.15; verify/bump latest
    helm:
      values: |
        crds:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  # On AKS, the admission "enforcer" injects extra namespaceSelector.matchExpressions
  # (control-plane, kubernetes.azure.com/managedby) into webhook configs so they skip
  # system namespaces — and cert-manager's cainjector rewrites clientConfig.caBundle.
  # Both read as permanent drift to Argo CD, so selfHeal re-syncs in a tight loop.
  # Ignore both fields. (For older cert-manager whose CRDs use conversion webhooks,
  # also ignore CustomResourceDefinition .spec.conversion.webhook.clientConfig.caBundle.)
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jqPathExpressions:
        - '.webhooks[]?.namespaceSelector.matchExpressions'
        - '.webhooks[]?.clientConfig.caBundle'
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jqPathExpressions:
        - '.webhooks[]?.namespaceSelector.matchExpressions'
        - '.webhooks[]?.clientConfig.caBundle'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      # Make selfHeal honor ignoreDifferences above — without this it keeps
      # re-syncing the ignored caBundle field (the "every second" loop).
      - RespectIgnoreDifferences=true
