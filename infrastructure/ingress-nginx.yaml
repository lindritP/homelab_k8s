# ingress-nginx — cluster ingress controller.
# Service type LoadBalancer provisions an Azure Load Balancer with a public IP.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"   # infrastructure deploys before apps
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.11.3   # verify/bump: `helm search repo ingress-nginx --versions`
    helm:
      values: |
        controller:
          service:
            type: LoadBalancer
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  # AKS's admission enforcer injects extra namespaceSelector.matchExpressions into the
  # ingress-nginx admission webhook (same drift/selfHeal loop as cert-manager). Ignore it.
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jqPathExpressions:
        - '.webhooks[]?.namespaceSelector.matchExpressions'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
