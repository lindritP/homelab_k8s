# whoami — tiny HTTP echo server; demo app reachable at https://whoami.lindrit.at.
# This Application adopts the raw manifests under apps/whoami/ and creates the
# namespace. The root app only adopts apps/*.yaml, so it does NOT double-manage
# apps/whoami/* — that's this Application's job.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: whoami
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/lindritP/homelab_k8s.git
    targetRevision: main
    path: apps/whoami
  destination:
    server: https://kubernetes.default.svc
    namespace: whoami
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
